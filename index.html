<!DOCTYPE html>
<html>
<head>
  <title>MoodMate AI Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<h1>✨ MoodMate AI</h1>

<p id="subtitle">Select your mood</p>

<!-- MOODS -->
<div>
  <button class="mood" data-mood="bored">😐 Bored</button>
  <button class="mood" data-mood="lazy">😴 Lazy</button>
  <button class="mood" data-mood="stressed">😵 Stressed</button>
  <button class="mood" data-mood="energetic">⚡ Energetic</button>
</div>

<button id="hitMe">🎲 Hit Me Different</button>

<hr/>

<!-- CONTENT -->
<h3>😂 Funny</h3>
<p id="funny"></p>

<h3>📱 Meme</h3>
<p id="meme"></p>

<h3>💬 Motivation</h3>
<p id="motivation"></p>

<!-- FEEDBACK -->
<h3>💭 Feedback</h3>
<button id="good">👍</button>
<button id="neutral">😐</button>
<button id="bad">👎</button>

<p id="suggestion"></p>

<hr/>

<!-- STATS -->
<h2>📊 Your Analytics</h2>

<p>🔄 Mood Changes: <span id="changes">0</span></p>
<p>🔥 Streak: <span id="streak">1</span> day</p>

<h3>📈 Mood Distribution</h3>
<ul id="stats"></ul>

<h3>🧠 Mood History</h3>
<ul id="history"></ul>

<h3>📊 Weekly Mood Chart</h3>
<div id="chart"></div>

<script src="script.js"></script>
</body>
</html>
